# course-manifest-csc114.yaml
# CSC-114 Artificial Intelligence I — Summer 2026 delivery
#
# DATA LINEAGE
# This manifest is SYNCED from Angela Westmoreland's canonical Norris Dashboard
# at https://github.com/AMLW05/csc_dash (courses/CSC-114/). That upstream repo
# is the source of truth for module structure, learning outcomes, deliverable
# categories, and Canvas-ready HTML pages. Local additions (Module 0, Summer-
# delivery compression notes) layer on top of the upstream structure but do
# not override it.
#
# When upstream changes, re-sync rather than edit this file by hand.

manifest_version: "0.1"
last_synced: "2026-05-17"
sync_source:
  repository: "AMLW05/csc_dash"
  branch: "main"
  reference_path: "courses/CSC-114/"
  upstream_status_summary: "100% built, certification-ready (per courses/CSC-114/canvas-html/README.md)"

course:
  id: "CSC-114"
  name: "Artificial Intelligence I"
  credits: 3
  description: |
    This course covers the study of intelligent agent design and rational
    decision making. Topics include goal-driven agents, search techniques,
    optimization, basic problem-solving methods, logic, knowledge-based agents,
    statistical and probabilistic reasoning, and the basics of machine learning.
    Upon completion, students should be able to demonstrate artificial
    intelligence design concepts.
    (Source: NC Community College official course catalog.)
  prerequisites: ["CSC-113"]
  corequisites: []

  local_repository: "course-csc113-template"
  upstream_repository: "AMLW05/csc_dash"
  textbook:
    title: "Deep Learning with Python, 3rd edition"
    author: "François Chollet"
    publisher: "Manning"
    url: "https://www.manning.com/books/deep-learning-with-python-third-edition"
    local_copy: "csc114/textbook/Deep_Learning_with_Python_Third_Edition.pdf"
    notebooks: "csc114/textbook/deep-learning-with-python-notebooks-master.zip"

  outcomes:
    - "Distinguish chatbot, tool-using assistant, and autonomous agent design patterns"
    - "Implement supervised learning techniques (classification, regression)"
    - "Design and evaluate AI agents with appropriate tool configurations"
    - "Apply neural networks and deep learning fundamentals using TensorFlow/Keras"
    - "Build computer vision pipelines using CNNs and transfer learning"
    - "Implement NLP techniques for sentiment analysis and text classification"
    - "Integrate multiple ML techniques in a capstone project with portfolio defense"

# Summer 2026 delivery context (local additions, not from upstream)
summer_2026_delivery:
  term_length_weeks: 8
  module_count: 8
  hours_per_week_target: 9  # f2f + asynchronous, per Senpai Teacherbot's planning notes
  compression_factor: 0.5  # 16-week canonical → 8-week summer
  co_instructor_absence: "Weeks 1–2 (solo instructor delivery for M00 + M01)"
  delivery_notes:
    - "Module 0 (M00) added locally for pre-Week-1 onboarding — does not exist upstream"
    - "Each canonical 2-week module compresses to 1 week in Summer term"
    - "'Either approach is success' framing: students may continue tweaking their agent (M00 product) or pivot to textbook track from M01 onward — both paths satisfy the course"
  instructor_planning_notes: "csc114/# csc 114 planning.md"

