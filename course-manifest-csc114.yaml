# Cross-cutting threads (from canonical csc_dash)
threads:
  - name: "PM Integration"
    description: |
      Project management thread woven through modules. Builds: story-point
      estimation (M02) → first sprint (M03) → autonomous execution (M05) →
      process portfolio (M08).
    upstream_path: "courses/CSC-114/pm-materials/"
  - name: "Sacred Flow"
    description: "GitHub discipline: Issue → Branch → Work → Commit → PR → Merge. Inherited from CSC-113."
  - name: "Four-Category Rubric"
    description: |
      AI Partnership Quality / Problem-Solving Process / Professional
      Communication / Critical Thinking & Ethics. 25% each, applied across
      all graded modules.

# Upstream csc_dash subdirectory categories (for reference when navigating courses/CSC-114/)
