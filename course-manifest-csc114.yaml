        path: "csc114/m00-setup-package.md"
        status: "draft (v0.1)"
        notes: "Contains: student email, student checklist, instructor pre-work, FAQ. Placeholders for {MEETING_1_DATE}, {COLLEGE_DOMAIN}, {INVITE_BY_DATE}, {TROUBLESHOOT_BY_DATE}."

